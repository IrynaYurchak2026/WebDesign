<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Приклад Lightbox2</title>

  <!-- 1. Підключення CSS Lightbox2 через CDN -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css"
  />

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    h1 { margin-bottom: 24px; }

    /* Сітка галереї */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .gallery a img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      transition: opacity 0.2s;
    }

    .gallery a:hover img {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <h1>Галерея зображень (Lightbox2)</h1>

  <div class="gallery">

    <!-- Одиночне зображення: data-lightbox має унікальне ім'я -->
    <a href="https://picsum.photos/seed/a/800/600"
       data-lightbox="photo-1"
       data-title="Пейзаж 1">
      <img src="https://picsum.photos/seed/a/400/300" alt="Пейзаж 1" />
    </a>

    <!-- Група зображень: data-lightbox однакове → утворює слайдшоу -->
    <a href="https://picsum.photos/seed/b/800/600"
       data-lightbox="gallery"
       data-title="Місто вночі">
      <img src="https://picsum.photos/seed/b/400/300" alt="Місто вночі" />
    </a>

    <a href="https://picsum.photos/seed/c/800/600"
       data-lightbox="gallery"
       data-title="Гори">
      <img src="https://picsum.photos/seed/c/400/300" alt="Гори" />
    </a>

    <a href="https://picsum.photos/seed/d/800/600"
       data-lightbox="gallery"
       data-title="Море">
      <img src="https://picsum.photos/seed/d/400/300" alt="Море" />
    </a>

  </div>

  <!-- 2. Підключення JS Lightbox2 через CDN (перед </body>) -->
  <!--    jQuery потрібен — Lightbox2 залежить від нього            -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>

  <!-- 3. Опційне налаштування Lightbox2 -->
  <script>
    lightbox.option({
      resizeDuration: 200,   // швидкість зміни розміру (мс)
      wrapAround: true,      // зациклення галереї
      albumLabel: 'Фото %1 з %2',  // підпис лічильника
      fadeDuration: 300      // плавне появлення
    });
  </script>

</body>
</html>
