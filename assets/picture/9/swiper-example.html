<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swiper.js — Приклад</title>

  <!-- 1. Підключаємо CSS Swiper з CDN -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
  />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      margin-bottom: 32px;
      font-size: 1.5rem;
      color: #94a3b8;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Обгортка слайдера — обов'язково задаємо ширину */
    .swiper {
      width: 100%;
      max-width: 700px;
      border-radius: 16px;
      overflow: hidden;
    }

    /* Кожен слайд */
    .swiper-slide {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 300px;
      font-size: 2rem;
      font-weight: 700;
      border-radius: 16px;
    }

    .slide-1 { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .slide-2 { background: linear-gradient(135deg, #0ea5e9, #06b6d4); }
    .slide-3 { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .slide-4 { background: linear-gradient(135deg, #10b981, #3b82f6); }

    /* Стилізуємо стрілки */
    .swiper-button-next,
    .swiper-button-prev {
      color: #fff;
    }

    /* Стилізуємо пагінацію */
    .swiper-pagination-bullet-active {
      background: #fff;
    }
  </style>
</head>
<body>

  <h1>Swiper.js — Базовий приклад</h1>

  <!-- 2. HTML-розмітка слайдера -->
  <div class="swiper" id="mySwiper">

    <!-- Обгортка слайдів (обов'язковий клас) -->
    <div class="swiper-wrapper">
      <div class="swiper-slide slide-1">Слайд 1</div>
      <div class="swiper-slide slide-2">Слайд 2</div>
      <div class="swiper-slide slide-3">Слайд 3</div>
      <div class="swiper-slide slide-4">Слайд 4</div>
    </div>

    <!-- Пагінація (крапки) -->
    <div class="swiper-pagination"></div>

    <!-- Кнопки навігації -->
    <div class="swiper-button-prev"></div>
    <div class="swiper-button-next"></div>

  </div>

  <!-- 3. Підключаємо JS Swiper з CDN -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <!-- 4. Ініціалізуємо Swiper -->
  <script>
    const swiper = new Swiper('#mySwiper', {
      // --- Основні параметри ---
      loop: true,           // Нескінченна прокрутка
      speed: 600,           // Швидкість анімації (мс)
      slidesPerView: 1,     // Кількість видимих слайдів
      spaceBetween: 20,     // Відступ між слайдами (px)

      // --- Автоматична прокрутка ---
      autoplay: {
        delay: 3000,              // Затримка між слайдами (мс)
        disableOnInteraction: false, // Не зупиняти після взаємодії
      },

      // --- Пагінація ---
      pagination: {
        el: '.swiper-pagination',
        clickable: true,  // Дозволяє клікати на крапки
      },

      // --- Стрілки навігації ---
      navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev',
      },

      // --- Адаптивність (брейкпоінти) ---
      breakpoints: {
        640: {
          slidesPerView: 1,
          spaceBetween: 20,
        },
        1024: {
          slidesPerView: 1,
          spaceBetween: 30,
        },
      },
    });
  </script>

</body>
</html>
